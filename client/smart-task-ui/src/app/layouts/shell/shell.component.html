<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="sidenavOpened()"
    (closed)="sidenavOpened.set(false)"
    class="shell-sidenav"
    role="navigation"
    aria-label="Main navigation"
  >
    <div class="sidenav-header">
      <h2>Smart Task Management</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active" (click)="isMobile() && sidenav.close()">
        <mat-icon matListIcon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/projects" routerLinkActive="active" (click)="isMobile() && sidenav.close()">
        <mat-icon matListIcon>folder</mat-icon>
        <span>Projects</span>
      </a>
      @if (canCreateProject()) {
        <a mat-list-item routerLink="/projects/create" routerLinkActive="active" (click)="isMobile() && sidenav.close()">
          <mat-icon matListIcon>add_circle</mat-icon>
          <span>New Project</span>
        </a>
      }
      <a mat-list-item routerLink="/tasks" routerLinkActive="active" (click)="isMobile() && sidenav.close()">
        <mat-icon matListIcon>check_circle</mat-icon>
        <span>Tasks</span>
      </a>
      @if (canCreateTask()) {
        <a mat-list-item routerLink="/tasks/create" routerLinkActive="active" (click)="isMobile() && sidenav.close()">
          <mat-icon matListIcon>add_task</mat-icon>
          <span>New Task</span>
        </a>
      }
      <a mat-list-item routerLink="/account" routerLinkActive="active" (click)="isMobile() && sidenav.close()">
        <mat-icon matListIcon>account_circle</mat-icon>
        <span>My Account</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

    <mat-sidenav-content>
      <mat-toolbar color="primary" class="shell-toolbar">
        <button
          type="button"
          mat-icon-button
          class="menu-btn"
          (click)="toggleSidenav()"
          aria-label="Toggle navigation"
        >
          <mat-icon>menu</mat-icon>
        </button>
        <span class="spacer"></span>
        <button
          mat-icon-button
          class="user-avatar"
          [routerLink]="['/account']"
          title="My Account"
          aria-label="My Account"
        >
          <span class="user-initials">{{ userInitials }}</span>
        </button>
        <button mat-icon-button (click)="logout()" title="Logout" aria-label="Logout">
          <mat-icon>logout</mat-icon>
        </button>
      </mat-toolbar>

    <main class="shell-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
