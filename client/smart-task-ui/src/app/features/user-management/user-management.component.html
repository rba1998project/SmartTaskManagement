<!-- Route: /users -->
<!-- Admin-only user management page with role assignment. -->
<div class="user-management-container">
  <div class="header">
    <h1>User Management</h1>
    <button mat-raised-button color="primary" (click)="load()" [disabled]="loading()">
      <mat-icon>refresh</mat-icon>
      Refresh
    </button>
  </div>

  @if (error()) {
    <div class="error-state">
      <p>{{ error() }}</p>
      <button mat-raised-button color="primary" (click)="load()">Retry</button>
    </div>
  } @else if (users().length === 0 && !loading()) {
    <div class="empty-state">
      <p>No users found.</p>
    </div>
  } @else {
    <div class="table-wrapper">
      @if (loading()) {
        <div class="loading-overlay">
          <mat-spinner diameter="40"></mat-spinner>
        </div>
      }
      <table mat-table [dataSource]="users()" class="mat-elevation-z1">
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let user">
            <span class="email-text">{{ user.email }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef>Full Name</th>
          <td mat-cell *matCellDef="let user">{{ user.fullName || '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let user">
            <mat-form-field appearance="fill" class="role-select">
              <mat-select [value]="user.role" (selectionChange)="onRoleChange(user, $event.value)">
                @for (option of roleOptions; track option.value) {
                  <mat-option [value]="option.value">{{ option.label }}</mat-option>
                }
              </mat-select>
            </mat-form-field>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let user">
            <button mat-raised-button color="primary" (click)="saveRole(user)" [disabled]="saving() === user.id">
              @if (saving() === user.id) {
                <mat-spinner diameter="20"></mat-spinner>
              } @else {
                Save
              }
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  }
</div>
