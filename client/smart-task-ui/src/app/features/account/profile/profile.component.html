<!-- Route: /account -->
<!-- Shows current user info and a disabled Change Password placeholder. -->
@if (currentUser(); as user) {
  <mat-card class="profile-card">
    <mat-card-header>
      <mat-card-title>My Account</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="profile-field">
        <span class="label">Email</span>
        <span class="value">{{ user.email }}</span>
      </div>
      <div class="profile-field">
        <span class="label">Full Name</span>
        <span class="value">{{ user.fullName || '-' }}</span>
      </div>
      <div class="profile-field">
        <span class="label">Roles</span>
        <div class="role-chips">
          @for (role of user.roles; track $index) {
            <mat-chip>{{ role }}</mat-chip>
          }
        </div>
      </div>

      <!-- Change Password is not available because the backend has no change-password endpoint. -->
      <div matTooltip="This feature will be introduced soon." class="placeholder-note disabled-tooltip">
        <mat-icon matTooltip="This feature will be introduced soon.">lock</mat-icon>
        <span>Change Password</span>
      </div>
    </mat-card-content>
  </mat-card>
}
